# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "Razzl Product Setup Copilot"
client_id = "1ae1d70c9809f5271450117519fc85cc"
application_url = "https://api-dev.razzl.com/shopify"
embedded = true

[access_scopes]
scopes = "read_products"

[auth]
redirect_urls = [
  "https://api-dev.razzl.com/api/commerce/shopify/auth/callback"
]

[webhooks]
api_version = "2026-07"

[[webhooks.subscriptions]]
topics = [
  "products/create",
  "products/update",
  "products/delete",
  "app/uninstalled",
  "app_subscriptions/update"
]
# Absolute HTTPS URL required — relative paths resolve under application_url (/shopify) and 404.
uri = "https://api-dev.razzl.com/api/commerce/shopify/webhooks"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "https://api-dev.razzl.com/api/commerce/shopify/webhooks"

[pos]
embedded = false
